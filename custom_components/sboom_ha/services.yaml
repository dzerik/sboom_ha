# Custom services для интеграции SBoom.
# Регистрируются в services.py:async_register_services (async_setup).
# Имена и описания — в translations/{en,ru}.json (ключ "services"),
# здесь только структура полей и селекторы.

refresh_metadata:
  fields:
    device_id:
      required: false
      selector:
        device:
          integration: sboom_ha
          multiple: true

reauth:
  fields:
    device_id:
      required: false
      selector:
        device:
          integration: sboom_ha
          multiple: true

bluetooth_device:
  fields:
    device_id:
      required: false
      selector:
        device:
          integration: sboom_ha
          multiple: true
    mac_address:
      required: true
      selector:
        text:
    command:
      required: true
      selector:
        select:
          options:
            - connect
            - disconnect
            - remove
