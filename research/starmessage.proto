// Реконструкция .proto StarMessage (вложенные типы) из клиента StarOS
// Источник: сериализаторы protobuf 3.10. Имена строковых полей — реальные
// (из UTF-8-проверки); типы message/скаляры — по wire-тегам; имена
// не-строковых полей и точные суб-типы помечены TBD.
syntax = "proto3";
package ru.sber.staros.protobuf;

message StarMessage {
  // Собственные top-level поля StarMessage (uuid и др.) + oneof полезных
  // нагрузок — маршрутизация команд идёт через StarCommand (см. отдельно).
  string uuid = 0; // depth-1 поле; номер TBD

  message BLEEasySetup {
    int32 field1 = 1;  // int32/enum
    bytes field2 = 2;  // <sub-message> тип TBD
    string pin_code = 3;
  }

  message BLESetMeUp {
    bytes field1 = 1;  // <sub-message> тип TBD
    string pin_code = 2;
    int32 field3 = 3;  // int32/enum
    int32 field4 = 4;  // int32/enum
  }

  message BLESetMeUpApproved {
    string device_name = 1;
  }

  message BLESetMeUpInitial {
    oneof payload {
      string show_device_name = 1;
      bytes field2 = 2;  // <sub-message> тип TBD
    }
  }

  message BiZoneData {
    string data = 1;
  }

  message CastOptions {
    oneof payload {
      string cast_device_id = 2;
      string cast_device_type = 3;
    }
  }

  message Directive {
    string name = 1;
    string payload = 2;
    string android_application_id = 3;
    bytes field4 = 4;  // <sub-message> тип TBD
    int32 field5 = 5;  // int32/enum
    int32 field6 = 6;  // int32/enum
    string sbercast_client_name = 7;
    int32 field8 = 8;  // int32/enum
    bool field9 = 9;
  }

  message EnableAdb {
    string password = 1;
  }

  message ForceDeleteBiometryVoice {
    string user_id = 1;
  }

  message ForceDeleteBiometryVoiceResponse {
    string wrapped_response = 1;
  }

  message GetAssistantAppInfoRequest {
    string android_application_id = 1;
  }

  message GetDownloadStatus {
    string name = 1;
  }

  message GetSmartAppMetaRequest {
    string android_application_id = 1;
  }

  message GetSmartAppMetaResponse {
    string meta = 1;
  }

  message GetStarosAuthToken {
    bytes field1 = 1;  // <sub-message> тип TBD
    string caller_app_id = 2;
  }

  message JsonWebToken {
    string header = 1;
    string payload = 2;
    string signature = 3;
  }

  message JsonWebTokenSignRequest {
    string audience = 1;
  }

  message LEDInternalRequestRunDynamic {
    string name = 1;
  }

  message LEDInternalRequestRunStatic {
    string name = 1;
    int32 field2 = 2;  // int32/enum
    int32 field3 = 3;  // int32/enum
  }

  message LEDInternalResponseStaticFinished {
    string name = 1;
  }

  message LEDInternalResponseStaticStarted {
    string name = 1;
    int32 field2 = 2;  // int32/enum
    int32 field3 = 3;  // int32/enum
  }

  message LatencyPoint {
    string latency_point = 1;
  }

  message RemoveDownload {
    string name = 1;
  }

  message RemoveFaceDescriptor {
    string user_id = 1;
  }

  message RemoveMetricsEnvironmentVariable {
    string key = 1;
  }

  message ReportLatency {
    string latency_point = 1;
    string event_name = 2;
    string event_data = 3;
    bool field4 = 4;
  }

  message ReportMessage {
    string message = 1;
    int32 field2 = 2;  // int32/enum
  }

  message Request {
    string id = 1;
  }

  message RequestDiagnosticInfo {
    string service = 1;
  }

  message ResponseDiagnosticInfo {
    string info = 1;
  }

  message SetBiometricPrivacySettings {
    string user_id = 1;
    string settings = 2;
  }

  message SetBiometricUserAvatar {
    string user_id = 1;
    bytes field2 = 2;  // <sub-message> тип TBD
  }

  message SetBiometricUserBiometryConfirmed {
    string user_id = 1;
    bool field2 = 2;
  }

  message SetBiometricUserName {
    string user_id = 1;
    string name = 2;
  }

  message SetBiometricUserSynchronized {
    string user_id = 1;
    bool field2 = 2;
  }

  message SetBiometricUserVoiceRegistered {
    string user_id = 1;
    bool field2 = 2;
  }

  message SetDownload {
    string name = 1;
    bytes field2 = 2;  // <sub-message> тип TBD
  }

  message SetFaceDescriptor {
    string user_id = 1;
    bytes field2 = 2;  // <sub-message> тип TBD
  }

  message SetMetricsEnvironmentVariable {
    string key = 1;
    string value = 2;
  }

  message SetNextVoiceBiometryCommandResponse {
    string wrapped_response = 1;
  }

  message SetSmartAppState {
    bytes field1 = 1;  // <sub-message> тип TBD
    string state = 2;
  }

  message SetVpsUserId {
    string vps_user_id = 1;
  }

  message SmartAppId {
    oneof payload {
      bytes field1 = 1;  // <sub-message> тип TBD
      string android_application_id = 2;
    }
  }

  message StarAPISubscribe {
    repeated int32 field1 = 1;  // int32/enum
    string subscriber_id = 2;
  }

  message StarOsBackendSession {
    string id = 1;
  }

  message StartBiometryConfirmationResponse {
    oneof payload {
      string code = 1;
      string error = 2;
    }
  }

  message TargetStarVersion {
    string version = 1;
  }

  message User {
    string user_id = 1;
    string access_token = 2;
    string vps_user_id = 3;
    bytes field4 = 4;  // <sub-message> тип TBD
    bytes field5 = 5;  // <sub-message> тип TBD
  }

  message UserCertificate {
    string certificate = 1;
  }

}
