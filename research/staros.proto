message EnvironmentsInfo {
  bytes field1 = 1; // <sub-message> TBD
  repeated string available_environments = 2;
}

message EsaAuthState {
  int32 field1 = 1; // int32/enum
  string user_code = 2;
  string verification_uri = 3;
  bool field4 = 4;
  bool field5 = 5;
  string access_token = 6;
  int32 field8 = 8; // int32/enum
  string refresh_token = 9;
  string esa_backend_url = 10;
  string esa_client_id = 11;
  int32 field12 = 12; // int32/enum
  string device_serial_number = 13;
}

message EsaAuthUpdate {
  oneof payload {
    string access_token = 1;
    bool field2 = 2;
  }
}

message EthernetInfo {
  int32 field1 = 1; // int32/enum
  string ip = 2;
  string mask = 3;
  string gateway = 4;
  repeated string dns = 5;
}

message ExpiredEsaToken {
