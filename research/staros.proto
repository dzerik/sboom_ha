  string version = 2;
  string vendor = 3;
  string product = 4;
  string brand_name = 5;
  string display_name = 6;
  string user_agent_postfix = 7;
  bool field8 = 8;
  string surface = 9;
  string device_serial_number = 10;
}

message DownloadSettings {
  string url = 1;
  int32 field2 = 2; // int32/enum
  string download_dir = 3;
  DownloadSettings_RsaVerification field4 = 4; // ← DownloadSettings.RsaVerification
  int32 field5 = 5; // int32/enum
  int32 field6 = 6; // int32/enum
  repeated bytes field7 = 7; // <sub-message> TBD
  int32 field8 = 8; // int32/enum
  bool field9 = 9;
}

message DownloadStatus {
  string name = 1;
  DownloadSettings field2 = 2; // ← DownloadSettings
  int32 field3 = 3; // int32/enum
  int32 field4 = 4; // int32/enum
  int32 field5 = 5; // int32/enum
  string path = 6;
  bool field7 = 7;
  int32 field8 = 8; // int32/enum
  string owner = 9;
}

message DownloadedUpdateInfo {
  string version = 1;
  bool field2 = 2;
  string file_path = 3;
  int32 field4 = 4; // int32/enum
  Metadata field5 = 5; // ← Metadata
  int32 field6 = 6; // int32/enum
}

message EnvironmentInfo {
  string name = 1;
