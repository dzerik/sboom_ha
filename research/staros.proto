}

message MultiRoomMessage {
  bytes field1 = 1; // <sub-message> TBD
  string master_cast_device_id = 2;
  int32 field10 = 10; // int32/enum
  string mr_sesssion_id = 11;
  oneof payload {
    MultiRoomState field3 = 3; // ← MultiRoomState
    MultiRoomCommand field4 = 4; // ← MultiRoomCommand
    StereoPairMessage field5 = 5; // ← StereoPairMessage
    bytes field6 = 6; // <sub-message> TBD
    bytes field7 = 7; // <sub-message> TBD
    bytes field8 = 8; // <sub-message> TBD
    bytes field9 = 9; // <sub-message> TBD
  }
}

message MultiRoomState {
  string music_state = 1;
  bool field2 = 2;
}

message MusicAlarmInfo {
  string payload = 1;
  int32 field2 = 2; // int32/enum
  string music_info = 3;
}

message NotificationMessage {
  string message_id = 1;
  int32 field2 = 2; // int32/enum
  string title = 3;
  string text = 4;
  string positive_button_text = 5;
  string negative_button_text = 6;
  string image_uri = 7;
  int32 field8 = 8; // int32/enum
  int32 field9 = 9; // int32/enum
  bool field10 = 10;
  string deep_link = 11;
  bool field12 = 12;
}

message NotificationResultMessage {
