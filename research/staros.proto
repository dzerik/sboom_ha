// Протокол StarOS (:20000 WSS), реконструкция из клиента. protobuf 3.10.
// Имена строковых полей — реальные; типы message резолвнуты где возможно
// (25 полей, помечены '←'); имена не-строковых полей и часть типов — TBD.
syntax = "proto3";
package ru.sber.staros.protobuf;

message Alarm {
  string id = 1;
  string sound_id = 2;
  int32 field3 = 3; // int32/enum
  bool field6 = 6;
  repeated Alarm_AlarmAction field7 = 7; // ← Alarm.AlarmAction
  oneof payload {
    Alarm_Timer field4 = 4; // ← Alarm.Timer
    Alarm_AlarmClock field5 = 5; // ← Alarm.AlarmClock
  }
}

message AlarmPlaybackControl {
  bytes field1 = 1; // <sub-message> TBD
  string alarm_id = 2;
  bool field3 = 3;
}

message AlarmRemoved {
  string id = 1;
}

message AppSettings {
  bytes field1 = 1; // <sub-message> TBD
  string app_settings_json = 2;
}

message AppSettingsByFrontendEndpoint {
  string app_frontend_endpoint = 1;
  string app_settings_json = 2;
}

message AppSettingsByFrontendEndpointRequest {
  string app_frontend_endpoint = 1;
}

message AppState {
  string id = 1;
  string state = 2;
}

message AssistantError {
  int32 field1 = 1; // int32/enum
  string text = 2;
  int32 field3 = 3; // int32/enum
  int32 field4 = 4; // int32/enum
  int32 field5 = 5; // int32/enum
  string tech_text = 6;
  bytes field7 = 7; // <sub-message> TBD
  int32 field8 = 8; // int32/enum
}

message AssistantInfo {
  int32 field1 = 1; // int32/enum
  string text = 2;
  int32 field3 = 3; // int32/enum
  string character = 4;
  bool field5 = 5;
  string mic_type = 6;
  string surface = 7;
  string user_id = 8;
  string user_channel = 9;
  bool field10 = 10;
}

message AssistantPlayerStart {
  bytes field1 = 1; // <sub-message> TBD
  SmartAppInfo field2 = 2; // ← SmartAppInfo
  string payload = 3;
}

message AssistantSpeech {
  string text = 1;
}

message BLESetupDevice {
  string name = 1;
  string device_id = 2;
  string device_type = 3;
  string device_serial_number = 4;
}

message BackendAuthState {
  bool field1 = 1;
  string auth_token = 2;
  string backendUrl = 3;
  int32 field4 = 4; // int32/enum
  int32 field7 = 7; // int32/enum
  int32 field8 = 8; // int32/enum
}

message Backup {
  string id = 1;
