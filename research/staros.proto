}

message BugReport {
  bytes field1 = 1; // <sub-message> TBD
  string payload = 2;
}

message CommonConfig {
  string config = 1;
}

message Contact {
  string first_name = 1;
  string last_name = 2;
  string vendor_id = 4;
  string contact_id = 5;
  string user_id = 6;
